<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Perokok</title>
</head>
<body>
    <h1 align="center">Survey Perokok</h1>
    <form>
    <div>
        <p>Siapa Nama Anda <br>
        <input type="text" name="nama">
        <p>Berapa Umur Anda <br>
        <input type="number" >
    </div>
    <div>
            <p>Apa Jenis Kelamin Anda ?</p>
            <input type="radio" id="Laki-laki" name="gender">
            <label for="Laki-Laki">Laki-Laki</label>
            <input type="radio" id="perempuan" name="gender">
            <label for="Perempuan">Perempuan</label>

    </div>
    <div>
            <p>Apakah anda Perokok?</p>
            <input type="radio" id="ya" name="rokok" >
            <label for="ya">Ya</label>
             <input type="radio" id="tidak" name="rokok" >
            <label for="tidak">Tidak</label>
        
    </div>
    <div>
            <p>Jika anda perokok ,rokok apa yang anda pernah coba?</p>
            <div> <input type="checkbox" id="gudangGaram" > 
            <label for="gudangGaram">Gudang Garam Filter</label>  
            </div>
            <div><input type="checkbox" id="luckyStrike" >
            <label for="luckyStrike">Lucky Strike</label>
            </div>
            <div>
            <input type="checkbox" id="Marlboro" >
            <label for="Marlboro">Marlboro</label>
            </div>
            <div><input type="checkbox" id="Esse" >
            <label for="Esse">Esse</label>
        </div>
    </div>
    
        <button type="submit">
            Submit
        </button>

        <button type="reset">
            Reset
        </button>

    </form>
</body>
</html>
